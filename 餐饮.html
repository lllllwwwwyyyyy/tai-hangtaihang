<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食预约平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system;}
        body{background:#f5f5f7;padding-bottom:60px;}
        .cate-item,.dis-item,.shop-card,.nav-item,.back,.book-btn,.opt-cancel,.time-item,.btn-cancel,.btn-sure{
            cursor:pointer;
        }
        .search-bar{padding:16px;}
        .search-input{width:100%;height:42px;background:#fff;border-radius:12px;border:none;outline:none;padding:0 16px;font-size:15px;box-shadow:0 1px 3px #00000010;}
        /* 新增返回按钮样式 */
        .back-to-center{
            margin:0 16px 12px;
            padding:10px 16px;
            background:#fff;
            border-radius:10px;
            display:flex;
            align-items:center;
            gap:8px;
            color:#333;
            font-size:14px;
            box-shadow:0 1px 3px #00000010;
        }
        .cate-wrap{padding:0 16px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar:none;}
        .cate-item{white-space:nowrap;padding:7px 16px;border-radius:20px;background:#fff;font-size:14px;color:#666;}
        .cate-item.active{background:#ff3b30;color:#fff;}
        .dis-wrap{padding:0 16px 15px;display:flex;gap:6px;}
        .dis-item{padding:6px 12px;border-radius:16px;border:1px solid #ddd;font-size:13px;color:#555;}
        .dis-item.active{border-color:#ff3b30;color:#ff3b30;}
        .shop-list{padding:0 16px 15px;}
        .shop-card{background:#fff;border-radius:14px;padding:12px;margin-bottom:12px;display:flex;gap:12px;}
        .shop-img{width:90px;height:90px;border-radius:10px;object-fit:cover;}
        .shop-info{flex:1;}
        .shop-name{font-size:16px;font-weight:500;color:#111;}
        .shop-score{color:#ff9500;font-size:14px;margin:4px 0;}
        .shop-txt{font-size:13px;color:#888;line-height:1.4;}
        .shop-tag{margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
        .tag{font-size:12px;padding:2px 8px;border-radius:10px;background:#f2f2f7;color:#666;}
        .top-tag{font-size:12px;background:#ff3b30;color:#fff;padding:2px 8px;border-radius:10px;}
        .footer-nav{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#fff;display:flex;border-top:1px solid #eee;z-index:99;}
        .nav-item{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#666;}
        .nav-item.active{color:#ff3b30;}
        .nav-icon{font-size:18px;margin-bottom:2px;}
        .detail-mask{position:fixed;inset:0;background:#fff;z-index:999;display:none;overflow:auto;}
        .det-top{display:flex;align-items:center;padding:15px;border-bottom:#eee solid 1px;}
        .back{font-size:18px;margin-right:15px;}
        .det-banner{width:100%;height:220px;object-fit:cover;}
        .det-main{padding:16px;}
        .det-title{font-size:20px;font-weight:bold;}
        .det-row{display:flex;flex-wrap:wrap;gap:15px;margin:12px 0;}
        .det-desc{color:#666;font-size:14px;line-height:1.6;}
        .book-btn{width:100%;height:44px;background:#ff3b30;color:#fff;border:none;border-radius:12px;font-size:15px;margin-top:20px;}
        .book-mask{position:fixed;inset:0;background:#00000050;display:none;align-items:center;justify-content:center;z-index:1000;}
        .book-box{width:88%;background:#fff;border-radius:16px;padding:20px;}
        .book-title{font-size:17px;font-weight:bold;text-align:center;margin-bottom:18px;}
        .line{margin-bottom:15px;}
        .line label{font-size:14px;color:#333;display:block;margin-bottom:6px;}
        .line input,.line select{width:100%;height:40px;border:1px solid #eee;border-radius:8px;padding:0 10px;outline:none;}
        .time-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
        .time-item{padding:6px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;}
        .time-item.on{background:#ff3b30;color:#fff;border-color:#ff3b30;}
        .btn-group{display:flex;gap:10px;margin-top:20px;}
        .btn-cancel{flex:1;height:42px;border-radius:8px;border:none;background:#eee;}
        .btn-sure{flex:1;height:42px;border-radius:8px;border:none;background:#ff3b30;color:#fff;}
        .empty{text-align:center;padding:60px;color:#999;font-size:14px;}
        .record-page{position:fixed;inset:0;background:#f5f5f7;z-index:998;display:none;overflow:auto;padding-bottom:60px;}
        .rec-top{display:flex;align-items:center;padding:15px;border-bottom:1px solid #eee;position:relative;}
        .rec-top .back{position:absolute;left:15px;top:15px;margin-right:0;}
        .rec-top-title{width:100%;text-align:center;font-size:17px;font-weight:bold;}
        .rec-list{padding:15px;}
        .rec-item{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;}
        .rec-shop{font-size:15px;font-weight:500;}
        .rec-info{font-size:13px;color:#666;margin:6px 0;line-height:1.5;}
        .rec-opt{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
        .opt-cancel{font-size:13px;color:#ff3b30;}
        /* 评论区样式 */
        .comment-wrap{margin-top:30px;padding-top:20px;border-top:1px solid #eee;}
        .comment-title{font-size:16px;font-weight:bold;margin-bottom:15px;}
        .comment-item{background:#f8f8f8;border-radius:10px;padding:12px;margin-bottom:10px;}
        .comment-user{font-size:14px;color:#333;font-weight:500;}
        .comment-text{font-size:13px;color:#666;margin-top:5px;line-height:1.5;}
        .comment-time{font-size:12px;color:#999;margin-top:5px;}
    </style>
</head>
<body>

                <div><span>营业：</span><span id="detTime"></span></div>

            <button class="book-btn" onclick="openBook()">立即预约</button>

            <div class="comment-wrap" id="commentBox">
                <div class="comment-title">用户评价</div>
            </div>
        </div>
    </div>

    <div class="book-mask" id="bookPage">
        <div class="book-box">
            <h3 class="book-title">用餐预约</h3>
            <!-- 新增姓名电话 -->
            <div class="line">
                <label>预约姓名</label>
                <input type="text" id="userName" placeholder="请输入真实姓名">
            </div>
            <div class="line">
                <label>联系电话</label>
                <input type="tel" id="userPhone" placeholder="请输入手机号码">
            </div>
            <div class="line">
                <label>预约日期</label>
                <input type="date" id="bookDate">
            </div>
            <div class="line">
                <label>用餐人数</label>
                <select id="bookPeople">
                    <option>1人</option>
                    <option>2人</option>
                    <option>3-4人</option>
                    <option>5人及以上</option>
                </select>
            </div>
            <div class="line">
                <label>到店时段</label>
                <div class="time-group" id="timeGroup">
                    <div class="time-item">11:00-12:00</div>
                    <div class="time-item">12:00-13:00</div>
                    <div class="time-item">13:00-14:00</div>
                    <div class="time-item">18:00-19:00</div>
                    <div class="time-item">19:00-20:00</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeBook()">取消</button>
                <button class="btn-sure" onclick="submitBook()">确认预约</button>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <div class="nav-icon">🏠</div>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="switchTab('record')">
            <div class="nav-icon">📋</div>
            <span>预约记录</span>
        </div>
    </div>

// 物理返回键：在首页按返回，也跳转到游客中心
window.addEventListener("popstate",function(){
    let bookShow = document.getElementById("bookPage").style.display === "flex";
    let detailShow = document.getElementById("detailPage").style.display === "block";
    let recordShow = document.getElementById("recordPage").style.display === "block";

    if(bookShow){closeBook();history.pushState({},'',location.href);return;}
    if(detailShow){closeDetail();history.pushState({},'',location.href);return;}
    if(recordShow){backToHome();history.pushState({},'',location.href);return;}
    // 只剩美食首页 → 强制跳转
    window.location.href = "youke.html";
});

function renderList(arr){
    let sorted = [...arr].sort((a,b)=>b.score - a.score);
    sorted = sorted.map((item,idx)=>{
        let rankText = "";
        let scoreNum = 90 - idx*2;
        if(idx===0){rankText="TOP1优选";scoreNum=100;}
        else if(idx===1){rankText="TOP2精选";scoreNum=95;}
        else if(idx===2){rankText="TOP3推荐";scoreNum=92;}
        let original = shopData.find(x=>x.id === item.id);
        if(original){original.rankText=rankText;original.scoreNum=scoreNum;}
        return {...item,rankText,scoreNum};
    });
    let html="";
    if(sorted.length===0){
        html='<div class="empty">暂无匹配店铺</div>';
    }else{
        sorted.forEach(item=>{
            let showTop = item.rankText ? `<span class="top-tag">${item.rankText}</span>` : "";
            html+=`
            <div class="shop-card" onclick="openDetail(${item.id})">
                <img class="shop-img" src="${item.img}">
                <div class="shop-info">
                    <div class="shop-name">${item.name}</div>
                    <div class="shop-score">综合评分 ${item.score} 分</div>
                    <div class="shop-txt">人均¥${item.price} · 距离${item.dis}米</div>
                    <div class="shop-tag">
                        <span class="tag">${getCateName(item.cate)}</span>
                        ${showTop}
                        <span class="tag">推荐系数${item.scoreNum}分</span>
                    </div>
                </div>
            </div>`;
        });
    }
    document.getElementById("shopList").innerHTML=html;
}

function getCateName(s){
    let map={meal:"正餐",snack:"小吃",dessert:"甜品",drink:"饮品",hotpot:"火锅"};
    return map[s]||"人气美食";
}

// 打开详情 + 加载评论
function openDetail(id){
    let d = shopData.find(x=>x.id === id);
    if(!d) return;
    document.getElementById("detImg").src=d.img;
    document.getElementById("detName").innerText=d.name;
    let titleStr = d.rankText ? `${d.rankText} · ` : "";
    document.getElementById("detScore").innerText=`${titleStr}推荐系数${d.scoreNum||90}分`;
    document.getElementById("detPrice").innerText=`${d.price}元/人`;
    document.getElementById("detDis").innerText=`${d.dis}米`;
    document.getElementById("detAddr").innerText=d.addr;
    document.getElementById("detTime").innerText=d.time;
    document.getElementById("detDesc").innerText=d.desc;

    // 渲染评论
    let commentHtml = '<div class="comment-title">用户评价</div>';
    if(d.comment.length===0){
        commentHtml += '<div style="color:#999;font-size:13px;">暂无用户评价</div>';
    }else{
        d.comment.forEach(c=>{
            commentHtml += `
            <div class="comment-item">
                <div class="comment-user">${c.user}</div>
                <div class="comment-text">${c.text}</div>
                <div class="comment-time">${c.time}</div>
            </div>`;
        });
    }
    document.getElementById("commentBox").innerHTML = commentHtml;
    document.getElementById("detailPage").style.display="block";
}

function closeDetail(){
    document.getElementById("detailPage").style.display="none";
}
function backToHome(){
    document.getElementById("recordPage").style.display="none";
    document.getElementById("homePage").style.display="block";
    document.querySelectorAll(".nav-item").forEach(v=>v.classList.remove("active"));
    document.querySelector(".nav-item").classList.add("active");
}
function switchTab(type){
    document.querySelectorAll(".nav-item").forEach(v=>v.classList.remove("active"));
    event.currentTarget.classList.add("active");
    if(type==="home"){
        document.getElementById("homePage").style.display="block";
        document.getElementById("recordPage").style.display="none";
    }else{
        document.getElementById("homePage").style.display="none";
        document.getElementById("recordPage").style.display="block";
        renderRecord();
    }
}

function openBook(){
    document.getElementById("bookPage").style.display="flex";
    document.getElementById("bookDate").value=new Date().toISOString().split('T')[0];
}
function closeBook(){
    document.getElementById("bookPage").style.display="none";
}
function submitBook(){
    let name = document.getElementById("userName").value.trim();
    let phone = document.getElementById("userPhone").value.trim();
    let date = document.getElementById("bookDate").value;
    let people = document.getElementById("bookPeople").value;
    if(!name){alert("请输入预约姓名");return;}
    if(!/^1\d{10}$/.test(phone)){alert("请输入正确手机号");return;}
    if(!selectTime){alert("请选择到店时段");return;}
    let info={
        id:Date.now(),
        shopName:document.getElementById("detName").innerText,
        userName:name,
        userPhone:phone,
        date:date,people:people,time:selectTime,status:"待到店"
    };
    bookRecord.unshift(info);
    localStorage.setItem("bookList",JSON.stringify(bookRecord));
    alert("预约成功！");
    closeBook();
    selectTime="";
    document.querySelectorAll(".time-item").forEach(t=>t.classList.remove("on"));
    document.getElementById("userName").value="";
    document.getElementById("userPhone").value="";
}

function renderRecord(){
    let html="";
    if(bookRecord.length===0){
        html='<div class="empty">暂无预约订单</div>';
    }else{
        bookRecord.forEach((item,index)=>{
            html+=`
            <div class="rec-item">
                <div class="rec-shop">${item.shopName}</div>
                <div class="rec-info">
                    预约人：${item.userName}<br>
                    联系电话：${item.userPhone}<br>
                    预约日期：${item.date}<br>
                    用餐人数：${item.people}<br>
                    到店时段：${item.time}<br>
                    订单状态：${item.status}
                </div>
                <div class="rec-opt">
                    <span class="opt-cancel" onclick="cancelBook(${index})">取消预约</span>
                </div>
            </div>`;
        });
    }
    document.getElementById("recordList").innerHTML=html;
}
function cancelBook(idx){
    if(confirm("确定取消该条预约吗？")){
        bookRecord.splice(idx,1);
        localStorage.setItem("bookList",JSON.stringify(bookRecord));
        renderRecord();
    }
}

function bindTimeSelect(){
    let times=document.querySelectorAll("#timeGroup .time-item");
    times.forEach(t=>{
        t.onclick=function(){
            times.forEach(x=>x.classList.remove("on"));
            this.classList.add("on");
            selectTime=this.innerText;
        };
    });
}
function bindFilter(){
    document.querySelectorAll(".cate-item").forEach(el=>{
        el.onclick=function(){
            document.querySelectorAll(".cate-item").forEach(e=>e.classList.remove("active"));
            this.classList.add("active");
            activeCate=this.dataset.cate;
            filterData();
        };
    });
    document.querySelectorAll(".dis-item").forEach(el=>{
        el.onclick=function(){
            document.querySelectorAll(".dis-item").forEach(e=>e.classList.remove("active"));
            this.classList.add("active");
            activeDis=Number(this.dataset.dis);
            filterData();
        };
    });
    document.getElementById("searchVal").addEventListener("input",filterData);
}
function filterData(){
    let key=document.getElementById("searchVal").value.toLowerCase().trim();
    let res=shopData.filter(item=>{
        let cOk=activeCate==="all"||item.cate===activeCate;
        let dOk=activeDis===0||item.dis<=activeDis;
        let sOk=!key||item.name.toLowerCase().includes(key)||item.desc.toLowerCase().includes(key);
        return cOk&&dOk&&sOk;
    });
    renderList(res);
}
</script>
</body>
</html>
